<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTrack — Trainer client manager</title>
  <meta name="description" content="FitTrack — a lightweight client-management CRM for personal trainers. Log which muscle groups each client trained, at a glance." />
  <meta property="og:title" content="FitTrack" />
  <meta property="og:description" content="A lightweight client-management CRM for personal trainers." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#1c1b1a" />

  <!-- iOS doesn't read the manifest for install behavior — these do the same job. -->
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitTrack" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />

  <!-- Inlined so the splash paints instantly, with zero wait on style.css or
       Google Fonts to download first — those can arrive whenever, this can't. -->
  <style>
    html, body { margin: 0; background: #1c1b1a; color: #eeeae2; font-family: system-ui, sans-serif; }
    .splash { min-height: 60vh; display: flex; align-items: center; justify-content: center; }
    .splash h1 {
      margin: 0;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -.01em;
      text-transform: uppercase;
      animation: splash-pulse 1.4s ease-in-out infinite;
    }
    .splash h1 span { color: #ff5a1f; }
    @keyframes splash-pulse { 0%, 100% { opacity: .5; } 50% { opacity: .9; } }
    @media (prefers-reduced-motion: reduce) {
      .splash h1 { animation: none; }
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <div class="splash">
      <h1 class="brand">Fit<span>Track</span></h1>
    </div>
  </main>
  <footer class="site-footer">
    <p><span class="mono">//</span> FitTrack — built by <strong>Shrey</strong></p>
  </footer>
  <script type="module" src="js/app.js"></script>
</body>
</html>
